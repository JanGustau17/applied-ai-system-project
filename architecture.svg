<svg viewBox="0 0 900 680" xmlns="http://www.w3.org/2000/svg" role="img" font-family="system-ui, sans-serif">
  <title>Game Glitch Investigator — System Architecture</title>
  <desc>
    Full data-flow diagram: User Input (guess, difficulty, personality, show-trace) feeds into
    the Streamlit UI (app.py). Input passes through the Input Guardrail (parse_guess / range check),
    then splits into the Game Logic Engine (logic_utils.py) and the 4-Step AI Hint Engine.
    The AI Hint Engine runs: Step 1 Context Gathering, Step 2 Pattern Selection,
    Step 3 RAG Retrieval from the Knowledge Base (knowledge_base.py), and Step 4 Personality
    Application (Coach / Cryptic / Encouraging). Both engines write into Session State, which
    drives the Output layer (hint, temperature, score, win/loss, AI suggestion, optional
    Agentic Reasoning Trace). Tests (tests/test_game_logic.py) cover logic_utils.py.
  </desc>

  <defs>
    <marker id="arr" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#888"/>
    </marker>
    <marker id="arr-gold" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#C4960F"/>
    </marker>
    <marker id="arr-dashed" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#B4B2A9"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="900" height="680" fill="#FAFAFA" rx="0"/>

  <!-- ══ TITLE ══ -->
  <text x="450" y="28" text-anchor="middle" font-size="15" font-weight="600" fill="#1a1a1a">Game Glitch Investigator — System Architecture</text>

  <!-- ══ ROW 1: User Input ══ -->
  <g>
    <rect x="275" y="46" width="350" height="48" rx="6" fill="#E6F1FB" stroke="#378ADD" stroke-width="1.5"/>
    <text x="450" y="66" text-anchor="middle" font-size="12" font-weight="600" fill="#0C447C">User Input</text>
    <text x="450" y="83" text-anchor="middle" font-size="10" fill="#185FA5">guess · difficulty (Easy / Normal / Hard) · AI personality · show-trace toggle · new game</text>
  </g>

  <!-- arrow ↓ -->
  <line x1="450" y1="94" x2="450" y2="114" stroke="#888" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- ══ ROW 2: Streamlit UI ══ -->
  <g>
    <rect x="255" y="114" width="390" height="48" rx="6" fill="#EAF3DE" stroke="#639922" stroke-width="1.5"/>
    <text x="450" y="135" text-anchor="middle" font-size="12" font-weight="600" fill="#27500A">Streamlit UI  (app.py)</text>
    <text x="450" y="151" text-anchor="middle" font-size="10" fill="#3B6D11">sidebar · text_input · submit · new-game · show-hint checkbox · debug expander</text>
  </g>

  <!-- arrow ↓ -->
  <line x1="450" y1="162" x2="450" y2="182" stroke="#888" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- ══ ROW 3: Input Guardrail ══ -->
  <g>
    <rect x="265" y="182" width="370" height="48" rx="6" fill="#FAEEDA" stroke="#BA7517" stroke-width="1.5"/>
    <text x="450" y="202" text-anchor="middle" font-size="12" font-weight="600" fill="#633806">Input Guardrail</text>
    <text x="450" y="218" text-anchor="middle" font-size="10" fill="#854F0B">parse_guess() · rejects non-numeric · rejects out-of-range · no attempt consumed on failure</text>
  </g>

  <!-- arrow ↓-left to Game Logic -->
  <line x1="355" y1="230" x2="175" y2="286" stroke="#888" stroke-width="1.5" marker-end="url(#arr)"/>
  <!-- arrow ↓-right to AI Hint Engine -->
  <line x1="545" y1="230" x2="695" y2="286" stroke="#888" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- ══ ROW 4 LEFT: Game Logic Engine ══ -->
  <g>
    <rect x="30" y="286" width="240" height="96" rx="6" fill="#EEEDFE" stroke="#7F77DD" stroke-width="1.5"/>
    <text x="150" y="306" text-anchor="middle" font-size="12" font-weight="600" fill="#3C3489">Game Logic Engine</text>
    <text x="150" y="322" text-anchor="middle" font-size="10" fill="#534AB7">check_guess()</text>
    <text x="150" y="336" text-anchor="middle" font-size="10" fill="#534AB7">update_score()  — attempt-weighted bonus</text>
    <text x="150" y="350" text-anchor="middle" font-size="10" fill="#534AB7">get_hint_temperature()  — Exact / Hot / Warm / Cold</text>
    <text x="150" y="364" text-anchor="middle" font-size="10" fill="#534AB7">get_range_for_difficulty()  — 1-20 / 1-100 / 1-200</text>
  </g>

  <!-- ══ ROW 4 RIGHT: AI Hint Engine outer box ══ -->
  <g>
    <rect x="630" y="286" width="240" height="188" rx="6" fill="#FFF5F8" stroke="#D4537E" stroke-width="1.5"/>
    <text x="750" y="306" text-anchor="middle" font-size="12" font-weight="600" fill="#4B1528">AI Hint Engine  (logic_utils.py)</text>

    <!-- Step 1 -->
    <rect x="644" y="314" width="212" height="30" rx="4" fill="#FBEAF0" stroke="#D4537E" stroke-width="0.8"/>
    <text x="750" y="328" text-anchor="middle" font-size="10" font-weight="500" fill="#993556">Step 1 — Context Gathering</text>
    <text x="750" y="340" text-anchor="middle" font-size="9" fill="#993556">distance · direction · narrowing · temperature</text>

    <!-- Step 2 -->
    <rect x="644" y="350" width="212" height="30" rx="4" fill="#FBEAF0" stroke="#D4537E" stroke-width="0.8"/>
    <text x="750" y="364" text-anchor="middle" font-size="10" font-weight="500" fill="#993556">Step 2 — Pattern Selection</text>
    <text x="750" y="376" text-anchor="middle" font-size="9" fill="#993556">first_guess · bracketed · very_close · moving_away …</text>

    <!-- Step 3 -->
    <rect x="644" y="386" width="212" height="30" rx="4" fill="#FBEAF0" stroke="#D4537E" stroke-width="0.8"/>
    <text x="750" y="400" text-anchor="middle" font-size="10" font-weight="500" fill="#993556">Step 3 — RAG Retrieval</text>
    <text x="750" y="412" text-anchor="middle" font-size="9" fill="#993556">retrieve_tip()  ← knowledge_base.py</text>

    <!-- Step 4 -->
    <rect x="644" y="422" width="212" height="30" rx="4" fill="#FBEAF0" stroke="#D4537E" stroke-width="0.8"/>
    <text x="750" y="436" text-anchor="middle" font-size="10" font-weight="500" fill="#993556">Step 4 — Personality Application</text>
    <text x="750" y="448" text-anchor="middle" font-size="9" fill="#993556">Coach · Cryptic · Encouraging  (few-shot)</text>
  </g>

  <!-- Knowledge Base node — between the two engines -->
  <g>
    <rect x="480" y="390" width="144" height="32" rx="4" fill="#FEF9EC" stroke="#C4960F" stroke-width="1"/>
    <text x="552" y="405" text-anchor="middle" font-size="10" font-weight="500" fill="#7A5A00">Knowledge Base</text>
    <text x="552" y="417" text-anchor="middle" font-size="9" fill="#7A5A00">knowledge_base.py · 9 strategy docs</text>
  </g>
  <!-- connector: KB → Step 3 -->
  <line x1="624" y1="406" x2="644" y2="401" stroke="#C4960F" stroke-width="1" stroke-dasharray="3,2" marker-end="url(#arr-gold)"/>

  <!-- arrows: engines → Session State -->
  <line x1="150" y1="382" x2="330" y2="498" stroke="#888" stroke-width="1.5" marker-end="url(#arr)"/>
  <line x1="700" y1="474" x2="570" y2="498" stroke="#888" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- ══ ROW 5: Session State ══ -->
  <g>
    <rect x="255" y="498" width="390" height="48" rx="6" fill="#E1F5EE" stroke="#1D9E75" stroke-width="1.5"/>
    <text x="450" y="518" text-anchor="middle" font-size="12" font-weight="600" fill="#04342C">Session State  (st.session_state)</text>
    <text x="450" y="534" text-anchor="middle" font-size="10" fill="#0F6E56">secret · attempts · score · history · status · last_hint · last_temperature · ai_hint · ai_trace</text>
  </g>

  <!-- arrow ↓ -->
  <line x1="450" y1="546" x2="450" y2="566" stroke="#888" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- ══ ROW 6: Output ══ -->
  <g>
    <rect x="130" y="566" width="640" height="58" rx="6" fill="#F1EFE8" stroke="#888780" stroke-width="1.5"/>
    <text x="450" y="586" text-anchor="middle" font-size="12" font-weight="600" fill="#2C2C2A">Output</text>
    <text x="450" y="601" text-anchor="middle" font-size="10" fill="#5F5E5A">hint · temperature · score · win/loss · AI suggestion · 🤖 Agentic Reasoning Trace (optional)</text>
    <text x="450" y="615" text-anchor="middle" font-size="9" fill="#888780">trace: step1_context · step2_pattern · step3_rag_tip · step4_personality · final_hint</text>
  </g>

  <!-- ══ ANNOTATION: logic_utils.py ══ -->
  <rect x="10" y="398" width="110" height="22" rx="4" fill="#F1EFE8" stroke="#B4B2A9" stroke-width="0.8"/>
  <text x="65" y="413" text-anchor="middle" font-size="10" fill="#5F5E5A">logic_utils.py</text>
  <line x1="65" y1="398" x2="65" y2="385" stroke="#B4B2A9" stroke-width="0.8" stroke-dasharray="3,2"/>
  <line x1="65" y1="385" x2="100" y2="382" stroke="#B4B2A9" stroke-width="0.8" stroke-dasharray="3,2"/>

  <!-- ══ ANNOTATION: tests ══ -->
  <rect x="10" y="428" width="146" height="22" rx="4" fill="#F1EFE8" stroke="#B4B2A9" stroke-width="0.8"/>
  <text x="83" y="443" text-anchor="middle" font-size="10" fill="#5F5E5A">tests/test_game_logic.py</text>
  <line x1="83" y1="428" x2="83" y2="416" stroke="#B4B2A9" stroke-width="0.8" stroke-dasharray="3,2"/>
  <line x1="83" y1="416" x2="110" y2="382" stroke="#B4B2A9" stroke-width="0.8" stroke-dasharray="3,2"/>

  <!-- ══ LEGEND ══ -->
  <g transform="translate(10, 490)">
    <rect x="0" y="0" width="168" height="118" rx="5" fill="#F7F7F7" stroke="#CCCCCC" stroke-width="0.8"/>
    <text x="84" y="16" text-anchor="middle" font-size="10" font-weight="600" fill="#444">Legend</text>
    <rect x="10" y="24" width="14" height="10" rx="2" fill="#E6F1FB" stroke="#378ADD" stroke-width="1"/>
    <text x="30" y="33" font-size="9" fill="#444">User-facing input</text>
    <rect x="10" y="40" width="14" height="10" rx="2" fill="#EAF3DE" stroke="#639922" stroke-width="1"/>
    <text x="30" y="49" font-size="9" fill="#444">UI layer (Streamlit)</text>
    <rect x="10" y="56" width="14" height="10" rx="2" fill="#EEEDFE" stroke="#7F77DD" stroke-width="1"/>
    <text x="30" y="65" font-size="9" fill="#444">Game logic</text>
    <rect x="10" y="72" width="14" height="10" rx="2" fill="#FBEAF0" stroke="#D4537E" stroke-width="1"/>
    <text x="30" y="81" font-size="9" fill="#444">AI / agentic pipeline</text>
    <rect x="10" y="88" width="14" height="10" rx="2" fill="#FEF9EC" stroke="#C4960F" stroke-width="1"/>
    <text x="30" y="97" font-size="9" fill="#444">Knowledge base (RAG)</text>
    <rect x="10" y="104" width="14" height="10" rx="2" fill="#E1F5EE" stroke="#1D9E75" stroke-width="1"/>
    <text x="30" y="113" font-size="9" fill="#444">State / Output</text>
  </g>
</svg>
