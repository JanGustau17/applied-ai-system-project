<svg viewBox="0 0 900 620" xmlns="http://www.w3.org/2000/svg" font-family="'Segoe UI', system-ui, sans-serif">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#64748b"/>
    </marker>
    <filter id="shadow" x="-5%" y="-5%" width="110%" height="120%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#00000022"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="900" height="620" fill="#0f1117"/>

  <!-- Title -->
  <text x="450" y="38" text-anchor="middle" font-size="17" font-weight="700" fill="#e2e8f0" letter-spacing="-0.3">Game Glitch Investigator — System Architecture</text>
  <text x="450" y="58" text-anchor="middle" font-size="11" fill="#475569">AI110 Project 4 · Mukhammadali Yuldoshev · Spring 2026</text>

  <!-- ══ Row 1: User Input ══ -->
  <rect x="325" y="80" width="250" height="56" rx="10" fill="#1e293b" stroke="#3b82f6" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="450" y="104" text-anchor="middle" font-size="13" font-weight="600" fill="#93c5fd">USER INPUT</text>
  <text x="450" y="122" text-anchor="middle" font-size="11" fill="#64748b">guess · difficulty · personality · new game</text>

  <!-- arrow down -->
  <line x1="450" y1="136" x2="450" y2="158" stroke="#64748b" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- ══ Row 2: Streamlit UI ══ -->
  <rect x="290" y="158" width="320" height="56" rx="10" fill="#1e293b" stroke="#22c55e" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="450" y="182" text-anchor="middle" font-size="13" font-weight="600" fill="#86efac">STREAMLIT UI</text>
  <text x="450" y="200" text-anchor="middle" font-size="11" fill="#64748b">app.py · sidebar · text_input · session state</text>

  <!-- arrow down -->
  <line x1="450" y1="214" x2="450" y2="236" stroke="#64748b" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- ══ Row 3: Input Guardrail ══ -->
  <rect x="310" y="236" width="280" height="56" rx="10" fill="#1e293b" stroke="#f59e0b" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="450" y="260" text-anchor="middle" font-size="13" font-weight="600" fill="#fcd34d">INPUT GUARDRAIL</text>
  <text x="450" y="278" text-anchor="middle" font-size="11" fill="#64748b">parse_guess() · rejects non-numeric · float→int</text>

  <!-- fork left -->
  <line x1="370" y1="292" x2="185" y2="340" stroke="#64748b" stroke-width="1.5" marker-end="url(#arrow)"/>
  <!-- fork right -->
  <line x1="530" y1="292" x2="715" y2="340" stroke="#64748b" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- ══ Row 4 Left: Game Logic Engine ══ -->
  <rect x="50" y="340" width="270" height="100" rx="10" fill="#1e293b" stroke="#a78bfa" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="185" y="364" text-anchor="middle" font-size="13" font-weight="600" fill="#c4b5fd">GAME LOGIC ENGINE</text>
  <text x="185" y="382" text-anchor="middle" font-size="11" fill="#64748b">logic_utils.py</text>
  <line x1="80" y1="392" x2="310" y2="392" stroke="#2d3748" stroke-width="1"/>
  <text x="185" y="408" text-anchor="middle" font-size="10.5" fill="#94a3b8">check_guess() · update_score()</text>
  <text x="185" y="426" text-anchor="middle" font-size="10.5" fill="#94a3b8">get_hint_temperature() · get_range()</text>

