  <rect x="580" y="340" width="270" height="100" rx="10" fill="#1e293b" stroke="#f472b6" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="715" y="364" text-anchor="middle" font-size="13" font-weight="600" fill="#f9a8d4">AI HINT ENGINE</text>
  <text x="715" y="382" text-anchor="middle" font-size="11" fill="#64748b">logic_utils.py · ai_hint_engine()</text>
  <line x1="610" y1="392" x2="840" y2="392" stroke="#2d3748" stroke-width="1"/>
  <text x="715" y="408" text-anchor="middle" font-size="10.5" fill="#94a3b8">4-step pipeline · RAG retrieval</text>
  <text x="715" y="426" text-anchor="middle" font-size="10.5" fill="#94a3b8">pattern classify · personality compose</text>

  <!-- RAG sub-node -->
  <rect x="620" y="458" width="190" height="44" rx="8" fill="#0f172a" stroke="#f472b6" stroke-width="1" stroke-dasharray="4,3"/>
  <text x="715" y="476" text-anchor="middle" font-size="11" font-weight="600" fill="#f9a8d4">knowledge_base.py</text>
  <text x="715" y="493" text-anchor="middle" font-size="10" fill="#64748b">9 docs · retrieve_tip() · tag scoring</text>
  <line x1="715" y1="440" x2="715" y2="458" stroke="#f472b6" stroke-width="1" stroke-dasharray="3,2"/>

  <!-- merge arrows to session state -->
  <line x1="185" y1="440" x2="350" y2="492" stroke="#64748b" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="715" y1="502" x2="715" y2="520" stroke="#64748b" stroke-width="1" stroke-dasharray="2,2"/>
  <line x1="580" y1="440" x2="560" y2="492" stroke="#64748b" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- ══ Row 5: Session State ══ -->
  <rect x="270" y="492" width="360" height="56" rx="10" fill="#1e293b" stroke="#34d399" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="450" y="516" text-anchor="middle" font-size="13" font-weight="600" fill="#6ee7b7">SESSION STATE</text>
  <text x="450" y="534" text-anchor="middle" font-size="11" fill="#64748b">secret · attempts · score · history · status · ai_hint</text>

  <!-- arrow down -->
  <line x1="450" y1="548" x2="450" y2="568" stroke="#64748b" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- ══ Row 6: Output ══ -->
  <rect x="200" y="568" width="500" height="40" rx="10" fill="#1e2a1e" stroke="#34d399" stroke-width="1" filter="url(#shadow)"/>
  <text x="450" y="586" text-anchor="middle" font-size="11" font-weight="600" fill="#86efac">OUTPUT</text>
  <text x="450" y="600" text-anchor="middle" font-size="10.5" fill="#64748b">hint message · temperature badge · score · win/loss · AI suggestion · reasoning trace</text>

  <!-- ══ Side labels ══ -->
  <!-- Tests label -->
  <rect x="50" y="468" width="180" height="34" rx="6" fill="#0f172a" stroke="#475569" stroke-width="1" stroke-dasharray="4,3"/>
  <text x="140" y="481" text-anchor="middle" font-size="10" fill="#64748b">tests/test_game_logic.py</text>
  <text x="140" y="496" text-anchor="middle" font-size="10" fill="#475569">20 pytest cases · all passing ✓</text>
  <line x1="185" y1="468" x2="185" y2="440" stroke="#475569" stroke-width="1" stroke-dasharray="3,2"/>

  <!-- Eval harness label -->
  <rect x="670" y="540" width="200" height="34" rx="6" fill="#0f172a" stroke="#475569" stroke-width="1" stroke-dasharray="4,3"/>
  <text x="770" y="553" text-anchor="middle" font-size="10" fill="#64748b">eval_harness.py</text>
  <text x="770" y="568" text-anchor="middle" font-size="10" fill="#475569">20 scenarios · 100% confidence ✓</text>
  <line x1="670" y1="548" x2="550" y2="548" stroke="#475569" stroke-width="1" stroke-dasharray="3,2" marker-end="url(#arrow)"/>
</svg>
