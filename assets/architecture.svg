<svg viewBox="0 0 760 520" xmlns="http://www.w3.org/2000/svg" role="img" font-family="system-ui, sans-serif">
  <title>Game Glitch Investigator — System Architecture</title>
  <desc>Data flow diagram: User Input feeds into Streamlit UI, which passes through the Input Guardrail (parse_guess), then splits into the Game Logic Engine and AI Hint Engine, both feeding into Session State, which drives the Output layer.</desc>

  <!-- background -->
  <rect width="760" height="520" fill="#ffffff" rx="0"/>

  <!-- Title -->
  <text x="380" y="30" text-anchor="middle" font-size="14" font-weight="500" fill="#1a1a1a">Game Glitch Investigator — System Architecture</text>

  <!-- ── Row 1: User Input ── -->
  <g>
    <rect x="300" y="52" width="160" height="44" rx="6" fill="#E6F1FB" stroke="#378ADD" stroke-width="1"/>
    <text x="380" y="71" text-anchor="middle" font-size="12" font-weight="500" fill="#0C447C">User Input</text>
    <text x="380" y="87" text-anchor="middle" font-size="10" fill="#185FA5">guess · difficulty · new game</text>
  </g>

  <!-- arrow down -->
  <line x1="380" y1="96" x2="380" y2="118" stroke="#888" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- ── Row 2: Streamlit UI ── -->
  <g>
    <rect x="270" y="118" width="220" height="44" rx="6" fill="#EAF3DE" stroke="#639922" stroke-width="1"/>
    <text x="380" y="137" text-anchor="middle" font-size="12" font-weight="500" fill="#27500A">Streamlit UI  (app.py)</text>
    <text x="380" y="153" text-anchor="middle" font-size="10" fill="#3B6D11">sidebar · text_input · buttons · hints</text>
  </g>

  <!-- arrow down -->
  <line x1="380" y1="162" x2="380" y2="184" stroke="#888" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- ── Row 3: Input Guardrail ── -->
  <g>
    <rect x="270" y="184" width="220" height="44" rx="6" fill="#FAEEDA" stroke="#BA7517" stroke-width="1"/>
    <text x="380" y="203" text-anchor="middle" font-size="12" font-weight="500" fill="#633806">Input Guardrail</text>
    <text x="380" y="219" text-anchor="middle" font-size="10" fill="#854F0B">parse_guess() · rejects non-numeric</text>
  </g>

  <!-- arrow down-left to game logic -->
  <line x1="340" y1="228" x2="190" y2="270" stroke="#888" stroke-width="1.5" marker-end="url(#arr)"/>
  <!-- arrow down-right to AI hint engine -->
  <line x1="420" y1="228" x2="570" y2="270" stroke="#888" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- ── Row 4 left: Game Logic Engine ── -->
  <g>
    <rect x="60" y="270" width="200" height="72" rx="6" fill="#EEEDFE" stroke="#7F77DD" stroke-width="1"/>
    <text x="160" y="291" text-anchor="middle" font-size="12" font-weight="500" fill="#3C3489">Game Logic Engine</text>
    <text x="160" y="307" text-anchor="middle" font-size="10" fill="#534AB7">check_guess()</text>
    <text x="160" y="321" text-anchor="middle" font-size="10" fill="#534AB7">update_score()</text>
    <text x="160" y="335" text-anchor="middle" font-size="10" fill="#534AB7">get_hint_temperature()</text>
  </g>

  <!-- ── Row 4 right: AI Hint Engine ── -->
  <g>
    <rect x="500" y="270" width="200" height="72" rx="6" fill="#FBEAF0" stroke="#D4537E" stroke-width="1"/>
    <text x="600" y="291" text-anchor="middle" font-size="12" font-weight="500" fill="#4B1528">AI Hint Engine</text>
    <text x="600" y="307" text-anchor="middle" font-size="10" fill="#993556">ai_hint_engine()</text>
    <text x="600" y="321" text-anchor="middle" font-size="10" fill="#993556">structured prompting</text>
    <text x="600" y="335" text-anchor="middle" font-size="10" fill="#993556">guess history analysis</text>
  </g>

  <!-- arrows from both engines to session state -->
  <line x1="210" y1="342" x2="320" y2="384" stroke="#888" stroke-width="1.5" marker-end="url(#arr)"/>
  <line x1="550" y1="342" x2="440" y2="384" stroke="#888" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- ── Row 5: Session State ── -->
  <g>
    <rect x="270" y="384" width="220" height="44" rx="6" fill="#E1F5EE" stroke="#1D9E75" stroke-width="1"/>
    <text x="380" y="403" text-anchor="middle" font-size="12" font-weight="500" fill="#04342C">Session State</text>
    <text x="380" y="419" text-anchor="middle" font-size="10" fill="#0F6E56">secret · attempts · score · history · status</text>
  </g>

  <!-- arrow down -->
  <line x1="380" y1="428" x2="380" y2="450" stroke="#888" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- ── Row 6: Output ── -->
  <g>
    <rect x="220" y="450" width="320" height="44" rx="6" fill="#F1EFE8" stroke="#888780" stroke-width="1"/>
    <text x="380" y="469" text-anchor="middle" font-size="12" font-weight="500" fill="#2C2C2A">Output</text>
    <text x="380" y="485" text-anchor="middle" font-size="10" fill="#5F5E5A">hint · temperature · score · win/loss · AI suggestion</text>
  </g>

  <!-- logic_utils.py label -->
  <rect x="30" y="385" width="110" height="22" rx="4" fill="#F1EFE8" stroke="#B4B2A9" stroke-width="0.8"/>
  <text x="85" y="400" text-anchor="middle" font-size="10" fill="#5F5E5A">logic_utils.py</text>
  <line x1="85" y1="385" x2="85" y2="365" stroke="#B4B2A9" stroke-width="0.8" stroke-dasharray="3,2"/>
  <line x1="85" y1="365" x2="160" y2="342" stroke="#B4B2A9" stroke-width="0.8" stroke-dasharray="3,2"/>

  <!-- tests label -->
  <rect x="620" y="385" width="120" height="22" rx="4" fill="#F1EFE8" stroke="#B4B2A9" stroke-width="0.8"/>
  <text x="680" y="400" text-anchor="middle" font-size="10" fill="#5F5E5A">tests/test_game_logic.py</text>
  <line x1="680" y1="385" x2="680" y2="365" stroke="#B4B2A9" stroke-width="0.8" stroke-dasharray="3,2"/>
  <line x1="680" y1="365" x2="600" y2="342" stroke="#B4B2A9" stroke-width="0.8" stroke-dasharray="3,2"/>

  <!-- arrowhead marker -->
  <defs>
    <marker id="arr" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#888"/>
    </marker>
  </defs>
</svg>
